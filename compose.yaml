# Deploy în Coolify: resursă nouă → Docker Compose → repo + branch → cale compose.yaml
# Setează variabilele în Coolify (Shared Variables) sau fișier .env lângă compose.
#
# Postfix/SMTP pe același VPS: folosește SMTP_HOST=host.docker.internal (vezi extra_hosts mai jos).

services:
  mail-api:
    build:
      context: ./mail-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${MAIL_API_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: "3000"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SMTP_HOST: ${SMTP_HOST:-host.docker.internal}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-website@highvibescreation.com}
      MAIL_TO: ${MAIL_TO:-office@highvibescreation.com}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_CONTACT_MAX: ${RATE_LIMIT_CONTACT_MAX:-1}
      RATE_LIMIT_NEWSLETTER_MAX: ${RATE_LIMIT_NEWSLETTER_MAX:-1}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
