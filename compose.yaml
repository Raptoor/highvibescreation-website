name: highvibescreation

services:
  website:
    container_name: highvibescreation-site
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - highvibes-net

  mail-api:
    container_name: highvibescreation-mail-api
    build:
      context: ./mail-api
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - highvibes-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: "3000"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-website@highvibescreation.com}
      MAIL_TO: ${MAIL_TO:-office@highvibescreation.com}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_CONTACT_MAX: ${RATE_LIMIT_CONTACT_MAX:-3}
      RATE_LIMIT_NEWSLETTER_MAX: ${RATE_LIMIT_NEWSLETTER_MAX:-3}

  cloudflared-highvibes:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-highvibes
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - highvibes-net
    depends_on:
      - website
      - mail-api

networks:
  highvibes-net:
    name: highvibes-net
